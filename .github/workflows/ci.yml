name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate YAML files
        run: |
          python3 -c "
          import yaml, sys
          files = ['docker-compose.yml', 'ngrok.yml']
          errors = []
          for f in files:
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'OK: {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Validate docker-compose config
        run: |
          cp .env_example .env
          docker compose config --quiet
          rm .env
